name: Run stat summaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run stat_summaries.py
        run: uv run ./scripts/stat_summaries.py
